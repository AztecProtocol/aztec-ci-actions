name: 'Run JS Tests'
description: 'Run JavaScript integration tests'

inputs:
  working-directory:
    description: 'Directory to run `yarn test:js` from. Use for monorepos where the contract package is under a subpath.'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Run JS tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        script -e -c "BASE_PXE_URL=http://localhost NODE_NO_WARNINGS=1 yarn test:js"
