name: 'Setup Aztec Environment'
description: 'Common setup for Aztec development: Node, Foundry, Aztec CLI, dependencies, and local network'

inputs:
  start-pxe:
    description: 'Whether to start PXE node'
    required: false
    default: 'false'
  run-compile:
    description: 'Whether to run aztec compile'
    required: false
    default: 'true'
  run-codegen:
    description: 'Whether to run aztec codegen (requires run-compile)'
    required: false
    default: 'false'
  foundry-version:
    description: 'Pin Foundry to this version. Defaults to v1.4.1 (last forge compatible with Aztec 4.2.0''s L1 deploy script — forge >= 1.5 added a --batch requirement that breaks sandbox start). Set to empty for latest stable.'
    required: false
    default: 'v1.4.1'
  working-directory:
    description: 'Directory where `aztec compile` and `aztec codegen` run. Use for monorepos where the Aztec contract lives under a subpath. yarn install and version detection still run at the repo root (so monorepos work with workspaces and root-mirrored aztecVersion).'
    required: false
    default: '.'

outputs:
  aztec-version:
    description: 'The detected Aztec version'
    value: ${{ steps.aztec-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ "${{ inputs.run-codegen }}" = "true" ] && [ "${{ inputs.run-compile }}" = "false" ]; then
          echo "::error::run-codegen requires run-compile (codegen needs compile artifacts); set run-compile to true"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.0.0'
        cache: 'yarn'

    - name: Update PATH for Aztec
      shell: bash
      run: |
        echo "$HOME/.aztec/current/bin" >> $GITHUB_PATH
        echo "$HOME/.aztec/bin" >> $GITHUB_PATH

    - name: Detect Aztec version
      id: aztec-version
      shell: bash
      run: |
        VER=$(node -p "require('./package.json').config.aztecVersion")
        echo "version=$VER" >> "$GITHUB_OUTPUT"
        echo "Aztec version: $VER"

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: ${{ inputs.foundry-version || 'stable' }}

    - name: Cache Aztec CLI
      id: cache-aztec
      uses: actions/cache@v4
      with:
        path: /home/runner/.aztec
        key: aztec-${{ runner.os }}-${{ steps.aztec-version.outputs.version }}

    - name: Install Aztec CLI
      if: steps.cache-aztec.outputs.cache-hit != 'true'
      shell: bash
      run: |
        INSTALL_URL="https://install.aztec.network/${{ steps.aztec-version.outputs.version }}/"
        echo "Installing from: $INSTALL_URL"
        curl -sL $INSTALL_URL > tmp.sh
        VERSION=${{ steps.aztec-version.outputs.version }} bash tmp.sh <<< yes "yes"

    - name: Switch CLI to target version
      if: steps.cache-aztec.outputs.cache-hit != 'true'
      shell: bash
      run: aztec-up install ${{ steps.aztec-version.outputs.version }}

    - name: Start local network
      if: inputs.start-pxe == 'true'
      shell: bash
      run: aztec start --local-network &

    - name: Install dependencies
      shell: bash
      run: yarn --frozen-lockfile

    - name: Compile contracts
      if: inputs.run-compile == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: aztec compile

    - name: Codegen wrappers
      if: inputs.run-codegen == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: aztec codegen target --outdir src/artifacts -f

    - name: Wait for local network (port 8080)
      if: inputs.start-pxe == 'true'
      shell: bash
      run: |
        echo "Waiting for local network on port 8080..."
        timeout=120
        elapsed=0
        while ! nc -z localhost 8080 2>/dev/null; do
          if [ $elapsed -ge $timeout ]; then
            echo "::error::Timed out waiting for port 8080 after ${timeout}s"
            exit 1
          fi
          sleep 2
          elapsed=$((elapsed + 2))
          echo "  waiting... (${elapsed}s)"
        done
        echo "Port 8080 is ready (took ${elapsed}s)"

