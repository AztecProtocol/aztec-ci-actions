name: Run Tests

on:
  workflow_call:
    inputs:
      run-js-tests:
        description: "Whether to run JS tests"
        type: boolean
        default: true
      run-noir-tests:
        description: "Whether to run Noir tests"
        type: boolean
        default: true
      runner:
        description: "GitHub runner label"
        type: string
        default: "ubuntu-latest-m"
      timeout:
        description: "Job timeout in minutes"
        type: number
        default: 120
      working-directory:
        description: "Directory where `aztec compile`, `aztec codegen`, `yarn test:js`, and `aztec test` run. Use for monorepos where the contract lives under a subpath. Defaults to the repo root."
        type: string
        default: "."

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # JS TESTS JOB
  # ══════════════════════════════════════════════════════════════════════════════
  js-tests:
    name: JS Tests
    if: ${{ inputs.run-js-tests }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: AztecProtocol/aztec-ci-actions/actions/setup-aztec@v0
        with:
          start-pxe: "true"
          run-codegen: "true"
          working-directory: ${{ inputs.working-directory }}

      - name: Run JS tests
        uses: AztecProtocol/aztec-ci-actions/actions/js-tests@v0
        with:
          working-directory: ${{ inputs.working-directory }}

  # ══════════════════════════════════════════════════════════════════════════════
  # NOIR TESTS JOB
  # ══════════════════════════════════════════════════════════════════════════════
  noir-tests:
    name: Noir Tests
    if: ${{ inputs.run-noir-tests }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: AztecProtocol/aztec-ci-actions/actions/setup-aztec@v0
        with:
          start-pxe: "false"
          run-codegen: "false"
          working-directory: ${{ inputs.working-directory }}

      - name: Run Noir tests
        uses: AztecProtocol/aztec-ci-actions/actions/noir-tests@v0
        with:
          working-directory: ${{ inputs.working-directory }}
